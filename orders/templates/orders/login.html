{% extends 'orders/base.html' %}

{% block title %}Acceso Administrador{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5 col-xl-4 animate-fade-in">
        <div class="glass-container">
            <div class="text-center mb-4">
                <h2 class="mb-1">Acceso Administrativo</h2>
                <p class="text-muted">Ingresa tus credenciales para continuar</p>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                {% if form.errors %}
                    <div class="alert alert-danger" style="background: rgba(239, 68, 68, 0.2); border-color: var(--danger); color: white;">
                        Usuario o contraseña incorrectos.
                    </div>
                {% endif %}
                
                <div class="mb-4">
                    <label class="form-label text-muted">Usuario</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-muted">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
